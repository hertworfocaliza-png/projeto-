<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow · Tarefas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-wrapper">

    <!-- Sidebar será injetada via JS -->

    <!-- Conteúdo principal -->
    <div class="main-content">

        <!-- Topbar -->
        <header class="topbar">
            <div>
                <div class="topbar-title">Tarefas</div>
                <div class="topbar-subtitle">Gerencie e acompanhe suas atividades</div>
            </div>
            <div class="topbar-actions">
                <span class="badge-date" id="dataHoje"></span>
            </div>
        </header>

        <!-- Body da página -->
        <main class="page-body">
            <div class="content-grid">

                <!-- Painel: Formulário -->
                <div class="panel">
                    <div class="panel-header">
<span class="panel-title">
<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
<line x1="12" y1="5" x2="12" y2="19"/>
<line x1="5" y1="12" x2="19" y2="12"/>
</svg>
<span id="formTitleText">Nova Tarefa</span>
</span>
                    </div>

                    <div class="panel-body">

                        <!-- Banner de edição -->
                        <div class="editing-banner hidden" id="editingBanner">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                            Editando tarefa ·
                            <button
                                    class="btn btn-cancel"
                                    style="padding:2px 8px;font-size:11px;"
                                    onclick="limparFormulario()">
                                Cancelar
                            </button>
                        </div>

                        <input type="hidden" id="id">

                        <div class="form-group">
                            <label>Título</label>
                            <input id="titulo" placeholder="Digite o título da tarefa">
                        </div>

                        <div class="form-group">
                            <label>Descrição</label>
                            <input id="descricao" placeholder="Descreva a tarefa brevemente">
                        </div>

                        <div class="form-group">
                            <label>Data de Entrega</label>
                            <input type="date" id="dataEntrega">
                        </div>

                        <div class="form-group">
                            <label>Prioridade</label>
                            <select id="prioridade">
                                <option value="BAIXA">🟢 Baixa</option>
                                <option value="MEDIA">🟡 Média</option>
                                <option value="ALTA">🔴 Alta</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select id="status">
                                <option value="PENDENTE">Pendente</option>
                                <option value="EM_ANDAMENTO">Em andamento</option>
                                <option value="CONCLUIDA">Concluída</option>
                            </select>
                        </div>

                        <button class="btn btn-primary" onclick="salvarTarefa()">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                                <polyline points="17 21 17 13 7 13 7 21"/>
                                <polyline points="7 3 7 8 15 8"/>
                            </svg>
                            Salvar Tarefa
                        </button>

                    </div>
                </div>

                <!-- Painel: Lista de tarefas -->
                <div class="panel">
                    <div class="panel-header">
<span class="panel-title">
<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
<line x1="8" y1="6" x2="21" y2="6"/>
<line x1="8" y1="12" x2="21" y2="12"/>
<line x1="8" y1="18" x2="21" y2="18"/>
<line x1="3" y1="6" x2="3.01" y2="6"/>
<line x1="3" y1="12" x2="3.01" y2="12"/>
<line x1="3" y1="18" x2="3.01" y2="18"/>
</svg>
                            Lista de Tarefas
</span>

                        <!-- Filtros -->
                        <div class="filter-bar">
                            <button class="filter-chip active" data-status="" onclick="filtrar('')">Todas</button>
                            <button class="filter-chip" data-status="PENDENTE" onclick="filtrar('PENDENTE')">Pendentes</button>
                            <button class="filter-chip" data-status="EM_ANDAMENTO" onclick="filtrar('EM_ANDAMENTO')">Em andamento</button>
                            <button class="filter-chip" data-status="CONCLUIDA" onclick="filtrar('CONCLUIDA')">Concluídas</button>
                        </div>
                    </div>

                    <div class="panel-body">
                        <div class="tasks-list" id="listaTarefas">
                            <!-- Tarefas injetadas via JS -->
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<script src="js/sidebar.js"></script>
<script src="js/script.js"></script>
</body>
</html>
